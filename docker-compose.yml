services:
  postgres:
    image: postgres:17-alpine
    container_name: interactive_video_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ivs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ivs_password}
      POSTGRES_DB: ${POSTGRES_DB:-ivs_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ivs_user} -d ${POSTGRES_DB:-ivs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: interactive_video_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ivs_user}:${POSTGRES_PASSWORD:-ivs_password}@postgres:5432/${POSTGRES_DB:-ivs_db}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: interactive_video_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
