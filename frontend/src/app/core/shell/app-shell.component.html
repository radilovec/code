<header class="topbar">
  <a class="topbar-brand" routerLink="/projects">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.2 6 3 11l-.9-2.4c-.3-.8.1-1.7.9-2L18.1 1.6c.8-.3 1.7.1 2 .9z"/>
        <path d="m6.2 5.3 3.1 3.9"/>
        <path d="m12.4 3.4 3.1 4"/>
        <path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
    </div>
    <span class="brand-name">StoryForge</span>
  </a>

  <span class="spacer"></span>

  @if (auth.isAuthenticated()) {
    <a class="topbar-link" routerLink="/projects">Мои проекты</a>
    <span class="topbar-user">{{ auth.user()?.email }}</span>
    <button class="topbar-btn" (click)="auth.logout()">Выйти</button>
  } @else {
    <a class="topbar-link" routerLink="/login">Войти</a>
    <a class="topbar-link" routerLink="/register">Регистрация</a>
  }
</header>

<main class="content">
  <router-outlet />
</main>
